name: Publish to GitLab PyPI

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Upload to GitLab PyPI
        env:
          TWINE_REPOSITORY_URL: ${{ secrets.GITLAB_PYPI_URL }}
          TWINE_USERNAME: ${{ secrets.GITLAB_PYPI_USERNAME || '__token__' }}
          TWINE_PASSWORD: ${{ secrets.GITLAB_PYPI_PASSWORD || secrets.GITLAB_PYPI_TOKEN }}
        run: |
          if [ -z "${TWINE_REPOSITORY_URL}" ]; then
            echo "Missing secret GITLAB_PYPI_URL"
            exit 1
          fi
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "Missing secret GITLAB_PYPI_PASSWORD (or GITLAB_PYPI_TOKEN)"
            exit 1
          fi
          python -m twine upload --non-interactive dist/*
