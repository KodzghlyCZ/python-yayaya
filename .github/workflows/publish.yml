# Publish yayaya to PyPI — https://pypi.org/project/yayaya/
#
# Trusted publishing (OIDC) must match on GitHub AND PyPI. If PyPI shows
# `invalid-publisher` / `environment: MISSING` in the debug claims, you almost
# always have one of:
#
#   A) PyPI "Workflow environment name" is set (e.g. pypi) but this job had no
#      `environment:` → OIDC omits the claim → PyPI rejects. Fix: keep the
#      `environment: pypi` block below and use the SAME name on PyPI.
#
#   B) PyPI environment is blank but owner / repository / workflow filename
#      don't match exactly (typo, wrong repo, or `Publish.yml` vs `publish.yml`).
#
# Setup:
# 1. GitHub repo → Settings → Environments → New → name: pypi (optional: protection rules).
# 2. PyPI → project yayaya → Manage → Publishing → GitHub trusted publisher:
#      Owner: KodzghlyCZ, Repository: python-yayaya, Workflow: publish.yml,
#      Environment name: pypi (must match the job below exactly).
# 3. Push this workflow, then run from a release or workflow_dispatch.
#
# If you insist on no GitHub Environment, remove the `environment:` block below
# and clear "Workflow environment name" on PyPI for this publisher.

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/yayaya/
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
