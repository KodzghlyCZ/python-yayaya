# Publish yayaya to PyPI (https://pypi.org/project/yayaya/)
#
# Setup (once):
# 1. PyPI → Your account (or project) → Publishing → "Add a pending publisher" → GitHub
#    - Repository, workflow: publish.yml, branch: main (or default). Leave "environment"
#      blank unless you add `environment: pypi` to the publish-pypi job and create that
#      environment in GitHub with the same name on PyPI.
# 2. Optional: add `environment: { name: pypi, url: https://pypi.org/p/yayaya }` under
#    publish-pypi, create that environment in GitHub (e.g. required reviewers), and set the
#    same environment name in PyPI's trusted publisher settings.
#
# Triggers: GitHub Release "published", or manual workflow_dispatch.

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
